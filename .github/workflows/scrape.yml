name: Quarterly IANA TLD Scrape

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape IANA TLDs
        run: python scraper.py

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "TLD Data ${{ steps.date.outputs.date }}"
          body: "IANA Root Zone Database snapshot — ${{ steps.date.outputs.date }}"
          files: iana_tlds.json

      - name: Keep only latest 3 releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const sorted = releases.data
              .filter(r => !r.draft)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const r of sorted.slice(3)) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: r.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${r.tag_name}`,
              });
              console.log(`Deleted release ${r.tag_name}`);
            }
